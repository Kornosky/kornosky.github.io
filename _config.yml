remote_theme: "mmistakes/minimal-mistakes@4.26.2"
plugins:
  - jekyll-include-cache
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate

minimal_mistakes_skin: "dark"
locale: "en-US"
title: "Chris Kornosky"
name: "Chris Kornosky"
description: "Pipeline Technical Director · VFX & Game Development"
url: "https://kornosky.github.io"

author:
  name: "Chris Kornosky"
  bio: "Pipeline TD at Ingenuity Studios. DevOps, Python, Houdini, and render infrastructure for VFX production."
  location: "Austin, Texas"
  avatar: "/assets/img/avatar-icon.png"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:christopher.kornosky@gmail.com"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/christopherkornosky/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/Kornosky"
    - label: "Portfolio"
      icon: "fas fa-fw fa-globe"
      url: "https://www.kornosky.site/"

include:
  - _pages

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
