name: Build Jekyll site
on: [push, pull_request]
jobs:
  build:
    name: Build Jekyll
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Same builder GitHub Pages uses for the real deploy, so a green
      # check here means the Pages build will succeed too.
      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
